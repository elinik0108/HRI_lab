<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pick a shoe</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="shoe_picker.css">
</head>
<body>
  <!-- ── Grid view ───────────────────────────────────────────────── -->
  <div class="page" id="grid-view">
    <div class="card-grid" id="card-grid"></div>
  </div>

  <!-- ── Detail view (hidden by default) ─────────────────────────── -->
  <div class="page detail-view hidden" id="detail-view">
    <button class="back-btn" id="back-btn">← Back</button>

    <div class="detail-body">
      <div class="detail-image-wrap">
        <img class="detail-image" id="detail-image" alt="">
      </div>
      <div class="detail-info">
        <h2 class="detail-title" id="detail-title"></h2>
        <p class="detail-meta" id="detail-meta"></p>
        <p class="detail-price" id="detail-price"></p>
        <button class="confirm-btn" id="confirm-btn">Confirm choice</button>
      </div>
    </div>
  </div>

  <!-- ── Confirmation flash ──────────────────────────────────────── -->
  <div class="feedback" id="feedback">
    <span class="feedback-icon">👟</span>
    <p class="feedback-text" id="fb-text">Selected!</p>
  </div>

  <script src="/libs/qimessaging/2/qimessaging.js"></script>
  <script src="shoe_picker.js" defer></script>
  <script src="nav.js"></script>
</body>
</html>
