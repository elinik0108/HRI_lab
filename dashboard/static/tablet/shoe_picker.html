<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pick a shoe</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="shoe_picker.css">
</head>
<body>
  <div class="page">
    <h1 class="title" id="title-el">Please pick a shoe</h1>

  </div>

  <script src="/libs/qimessaging/2/qimessaging.js"></script>
  <script src="shoe_picker.js" defer></script>
  <script src="nav.js"></script>
