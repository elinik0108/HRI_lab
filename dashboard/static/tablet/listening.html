<!DOCTYPE html>
<!--
  Pepper Tablet — Listening page
  ================================
  Displayed while Speech-to-Text is active.

  URL parameters:
    ?prompt=What would you like to order?   Optional prompt shown below the indicator
    ?color=#58a6ff                           Accent colour override

  Example:
    http://LAPTOP:8080/tablet/listening.html?prompt=I+am+listening...
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Listening…</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* Mic icon with concentric pulsing rings */
    .mic-wrap {
      position: relative;
      width: clamp(120px, 25vw, 200px);
      height: clamp(120px, 25vw, 200px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid var(--accent);
      animation: expand 2s ease-out infinite;
      opacity: 0;
    }
    .ring-1 { width: 90%;  height: 90%;  animation-delay: 0s; }
    .ring-2 { width: 110%; height: 110%; animation-delay: .4s; }
    .ring-3 { width: 130%; height: 130%; animation-delay: .8s; }

    @keyframes expand {
      0%   { transform: scale(.8); opacity: .7; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    .mic-icon {
      font-size: clamp(3.5rem, 10vw, 7rem);
      z-index: 1;
      filter: drop-shadow(0 0 16px var(--accent));
    }

    /* Animated dots for "listening..." */
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    /* Wave bars */
    .wave-bars {
      display: flex;
      align-items: flex-end;
      gap: .35rem;
      height: clamp(2rem, 5vw, 4rem);
    }
    .bar {
      width: clamp(.35rem, 1vw, .8rem);
      border-radius: 2px;
      background: var(--accent);
      animation: wave 1.1s ease-in-out infinite;
    }
    .bar:nth-child(1) { animation-delay: 0s; }
    .bar:nth-child(2) { animation-delay: .15s; }
    .bar:nth-child(3) { animation-delay: .3s; }
    .bar:nth-child(4) { animation-delay: .45s; }
    .bar:nth-child(5) { animation-delay: .6s; }
    .bar:nth-child(6) { animation-delay: .45s; }
    .bar:nth-child(7) { animation-delay: .3s; }
    .bar:nth-child(8) { animation-delay: .15s; }

    @keyframes wave {
      0%, 100% { height: 20%; }
      50%       { height: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="mic-wrap">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <span class="mic-icon">🎤</span>
    </div>

    <h1 class="title">
      Listening<span class="dots"></span>
    </h1>

    <div class="wave-bars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>

    <p class="body-text" id="prompt-el" style="display:none; color: var(--text-muted);"></p>
  </div>

  <script>
    const p = new URLSearchParams(location.search);
    const prompt = p.get('prompt') || '';
    const color  = p.get('color')  || '';

    if (prompt) {
      const el = document.getElementById('prompt-el');
      el.textContent = prompt;
      el.style.display = '';
    }

    if (color) {
      document.documentElement.style.setProperty('--accent', color);
    }
  </script>
</body>
</html>
