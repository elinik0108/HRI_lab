<!DOCTYPE html>
<!--
  Pepper Tablet — Menu / Choice page
  =====================================
  Display a list of tappable buttons.  When a button is tapped, the page
  POSTs to the dashboard server at /api/tablet_input so the robot can react.

  URL parameters:
    ?title=What+would+you+like%3F   Title above the buttons (required)
    ?items=Option+A,Option+B,Option+C   Comma-separated button labels
    ?subtitle=Choose+one+option         Optional subtitle / instruction
    ?color=#58a6ff                      Accent colour override
    ?columns=2                          Force number of columns (auto by default)

  When a button is tapped the page sends:
    POST /api/tablet_input   {"action": "menu_choice", "value": "Option A", "index": 0}

  The robot can read this with:
    from HRI_lab_Pepper.dashboard import get_tablet_input
    choice = get_tablet_input()
    # {"action": "menu_choice", "value": "Option A", "index": 0, "ts": ...}

  Example:
    http://LAPTOP:8080/tablet/menu.html?title=Pick+a+topic&items=Weather,News,Jokes
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menu</title>
  <link rel="stylesheet" href="base.css">
  <style>
    .menu-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 1em 1.4em;
      font-size: var(--btn-size);
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      min-height: clamp(3rem, 10vw, 6rem);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
    }

    .menu-btn:hover, .menu-btn:focus {
      background: var(--accent-dk);
      border-color: var(--accent);
      color: #fff;
      outline: none;
    }

    .menu-btn:active { transform: scale(.96); }

    .menu-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* Feedback overlay "✓ Sent" */
    .feedback {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      z-index: 99;
      font-size: clamp(3rem, 10vw, 7rem);
      flex-direction: column;
      gap: 1rem;
    }
    .feedback.show { opacity: 1; pointer-events: all; }
    .feedback p {
      font-size: var(--body-size);
      color: var(--success);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="page page-top" style="gap: 1.2rem;">
    <h1 class="title" id="title-el">Choose an option</h1>
    <p class="subtitle" id="subtitle-el" style="display:none"></p>
    <div class="menu-grid" id="menu-grid">
    </div>
  </div>

  <!-- Feedback flash -->
  <div class="feedback" id="feedback">
    <span>✅</span>
    <p id="feedback-text">Choice sent!</p>
  </div>

  <script>
    const p = new URLSearchParams(location.search);

    const title    = p.get('title')    || 'Choose an option';
    const subtitle = p.get('subtitle') || '';
    const rawItems = p.get('items')    || 'Option 1,Option 2,Option 3';
    const color    = p.get('color')    || '';
    const columns  = parseInt(p.get('columns') || '0', 10);

    const items = rawItems.split(',').map(s => s.trim()).filter(Boolean);

    document.getElementById('title-el').textContent = title;

    if (subtitle) {
      const el = document.getElementById('subtitle-el');
      el.textContent = subtitle;
      el.style.display = '';
    }

    if (color) {
      document.documentElement.style.setProperty('--accent', color);
    }

    const grid = document.getElementById('menu-grid');
    if (columns > 0) {
      grid.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
    }

    // ── Build buttons ────────────────────────────────────────────────────
    items.forEach((label, idx) => {
      const btn = document.createElement('button');
      btn.className = 'menu-btn';
      btn.textContent = label;
      btn.addEventListener('click', () => handleChoice(btn, label, idx));
      grid.appendChild(btn);
    });

    // ── Handle tap ───────────────────────────────────────────────────────
    let busy = false;

    function handleChoice(btn, value, index) {
      if (busy) return;
      busy = true;

      btn.classList.add('selected');

      const payload = { action: 'menu_choice', value, index };

      // POST to dashboard server (best-effort — works when served by dashboard)
      fetch('/api/tablet_input', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }).catch(() => {/* server might not be reachable from tablet browser */});

      // Visual feedback
      const fb = document.getElementById('feedback');
      document.getElementById('feedback-text').textContent = `"${value}" sent!`;
      fb.classList.add('show');

      setTimeout(() => {
        fb.classList.remove('show');
        btn.classList.remove('selected');
        busy = false;
      }, 1800);
    }
  </script>
<script src="nav.js"></script>
</body>
</html>
